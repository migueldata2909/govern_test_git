version: 2

models:
  - name: orders
    description: "Core sales transaction table. Internal. Cross-domain key: order_id referenced by logistics.shipments and logistics.returns."
    columns:
      - name: order_id
        description: "Unique order identifier. Also used in Logistics domain."
        tests: [unique, not_null]
      - name: customer_id
        description: "FK to shared.customers."
        tests: [not_null]
      - name: status
        tests: [not_null]
      - name: total_amount
        tests: [not_null]

  - name: order_lines
    description: "Line items per order. Links orders to products."
    columns:
      - name: line_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: invoices
    description: "Invoice records. Financial — Restricted. Tier1."
    columns:
      - name: invoice_id
        tests: [unique, not_null]
      - name: order_id
        tests: [not_null]
      - name: status
        tests: [not_null]

  - name: payments
    description: "Payment transactions. Financial, PCI scope. Restricted. Tier1."
    columns:
      - name: payment_id
        tests: [unique, not_null]
      - name: method
        tests: [not_null]

  - name: sales_reps
    description: "Internal sales team. PII — GDPR applies."
    columns:
      - name: rep_id
        tests: [unique, not_null]
      - name: rep_email
        tests: [unique, not_null]

  - name: promotions
    description: "Product promotions and discounts. Internal."
    columns:
      - name: promo_id
        tests: [unique, not_null]

  - name: sales_targets
    description: "Quarterly sales targets per rep. KPI source. Internal."
    columns:
      - name: target_id
        tests: [unique, not_null]
      - name: achievement_pct
        description: "Calculated: achieved / target × 100."

  - name: revenue_daily
    description: "Daily revenue aggregation. KPI mart — no PII. Certified Tier1."
    columns:
      - name: date
        tests: [not_null]
      - name: total_revenue
        tests: [not_null]
      - name: order_count
        tests: [not_null]
