name: 'govern_test'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# -------------------------
# SEEDS
# -------------------------
seeds:
  govern_test:
    seed_sales_reps:
      +column_types:
        phone: varchar(20)
        manager_id: varchar(10)

# -------------------------
# MODELS
# -------------------------
models:
  govern_test:
    +persist_docs:
      relation: true
      columns: true

    # EXISTING — unchanged
    staging:
      +materialized: view
      +schema: staging

    marts:
      +materialized: table

    # NEW — Shared domain
    shared:
      +materialized: table
      +schema: shared
      +tags: ["shared", "cross-domain"]

    # NEW — Sales domain
    sales:
      +schema: sales
      +tags: ["sales"]

      staging:
        +materialized: view
        +schema: sales_staging
        +tags: ["staging"]

      marts:
        +materialized: table
        +schema: sales
        +tags: ["sales", "mart"]

    # NEW — Logistics domain (Snowflake — add later)
    logistics:
      +schema: logistics
      +tags: ["logistics"]

      staging:
        +materialized: view
        +schema: logistics_staging
        +tags: ["staging"]

      marts:
        +materialized: table
        +schema: logistics
        +tags: ["logistics", "mart"]