version: 2

models:
  - name: warehouses
    description: "Warehouse locations. geo_id cross-references shared.geography (PostgreSQL)."
    columns:
      - name: warehouse_id
        tests: [unique, not_null]
      - name: type
        tests: [not_null]

  - name: suppliers
    description: "Supplier master data. Internal."
    columns:
      - name: supplier_id
        tests: [unique, not_null]

  - name: inventory
    description: "Stock levels by warehouse and product. product_id cross-references shared.products."
    columns:
      - name: inventory_id
        tests: [unique, not_null]
      - name: qty_available
        description: "Calculated: qty_on_hand minus qty_reserved."
      - name: needs_reorder
        description: "True when qty_on_hand is at or below reorder_level."

  - name: purchase_orders
    description: "Procurement orders to suppliers."
    columns:
      - name: po_id
        tests: [unique, not_null]
      - name: status
        tests: [not_null]

  - name: shipments
    description: "Shipment records. Cross-domain: order_id references sales.orders, customer_id references shared.customers (both PostgreSQL)."
    columns:
      - name: shipment_id
        tests: [unique, not_null]
      - name: order_id
        description: "Cross-domain FK referencing sales.orders.order_id."
        tests: [not_null]
      - name: customer_id
        description: "Quasi-PII: links to shared.customers. Does not store personal data directly."
        tests: [not_null]
      - name: status
        tests: [not_null]

  - name: shipment_events
    description: "Tracking event log per shipment. Append-only history."
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: shipment_id
        tests: [not_null]

  - name: delivery_sla
    description: "Aggregated SLA performance by carrier and region. KPI source — no PII. Certified Tier1."
    columns:
      - name: sla_id
        tests: [unique, not_null]
      - name: sla_pct
        description: "Percentage of shipments meeting SLA target."
      - name: sla_status
        description: "RAG status: GREEN >= 95%, AMBER >= 85%, RED < 85%."
        tests: [not_null]

  - name: returns
    description: "Product return records. Cross-domain: order_id references sales.orders (PostgreSQL)."
    columns:
      - name: return_id
        tests: [unique, not_null]
      - name: order_id
        description: "Cross-domain FK referencing sales.orders.order_id."
        tests: [not_null]
      - name: reason
        tests: [not_null]
